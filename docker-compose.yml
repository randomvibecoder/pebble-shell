name: pebble-shell

services:
  agent:
    build: .
    env_file:
      - .env
    ports:
      - "${HOST_APP_PORT:-8080}:8080"
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"
      - "8084:8084"
      - "8085:8085"
      - "4001:4001"
    volumes:
      - agent-workspace:/workspace
    pids_limit: 256
    mem_limit: 2g
    cpus: 2
    restart: unless-stopped

volumes:
  agent-workspace:
